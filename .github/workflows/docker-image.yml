name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Image zu Docker Hub pushen?"
        required: true
        type: boolean
        default: true

jobs:
  verify_build:
    uses: ./.github/workflows/ci.yml

  build:
    needs: verify_build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build . --tag sarurier/archievment-frontend:latest
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}
      - name: Publish Docker image
        if: ${{ github.event_name == 'push' || github.event.inputs.push_image == 'true' }}
        run: docker push sarurier/archievment-frontend:latest
