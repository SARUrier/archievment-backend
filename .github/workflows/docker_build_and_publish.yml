name: Docker Build and Publish

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to Github Container Registry?"
        required: true
        type: boolean
        default: true

jobs:
  verify_build:
    uses: ./.github/workflows/gradle_build.yml

  docker_build_and_publish:
    needs: verify_build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
    
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Log in to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: SARUrier
          password: ${{ secrets.GH_GHCR_PAT }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' || github.event.inputs.push_image == 'true' }}
          tags: ghcr.io/sarurier/archievment-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
