name: Docker Build and Publish

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Image zu Docker Hub pushen?"
        required: true
        type: boolean
        default: true

jobs:
  verify_build:
    uses: ./.github/workflows/gradle_build.yml

  docker_build_and_publish:
    needs: verify_build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: SARUrier
          password: ${{ secrets.GH_GHCR_PAT }}

      - name: Build Docker image
        run: docker build . --tag ghcr.io/sarurier/archievment-backend:latest
        
      - name: Publish Docker image
        if: ${{ github.event_name == 'push' || github.event.inputs.push_image == 'true' }}
        run: docker push ghcr.io/sarurier/archievment-backend:latest
